# Cloudflare Cache Preloader — site configuration.
# Run locally:  uv run python -m preloader --config config/sites.yml --dry-run
# Run a single site:  uv run python -m preloader --config config/sites.yml --site iem
#
# WORDFENCE NOTE: Both sites run Wordfence which blocks IPs exceeding its
# default 240 pages/min rate limit with HTTP 503.
#
# Rate limiting is now enforced at the HTTP-transport layer, meaning every
# outbound request — including redirect follow-ups — counts against the gap.
# WordPress typically chains 2–4 redirects per logical URL (http→https,
# non-www→www, missing-slash→trailing-slash), so the effective Wordfence
# hit-rate is 3–4× the logical URL rate. Account for this by setting
# request_delay_ms conservatively:
#
#   request_delay_ms: 1500  →  ~40 logical req/min  →  ~120–160 HTTP req/min
#   request_delay_ms: 3000  →  ~20 logical req/min  →  ~60–80  HTTP req/min  (safer)
#
# The config below targets ~40 logical req/min per site (well below 240/min).

defaults:
  fetcher: httpx
  concurrency: 3
  timeout_seconds: 20
  retry_attempts: 2
  max_urls_per_site: 5000
  request_delay_ms: 250

sites:
  - name: iem
    sitemap_urls:
      - https://iem.edu.in/sitemap_index.xml
      - https://iem.edu.in/sitemap.xml        # fallback if index not present
    concurrency: 2
    request_delay_ms: 1500                    # ~40 logical req/min including redirects

  - name: uem
    sitemap_urls:
      - https://uem.edu.in/sitemap_index.xml
      - https://uem.edu.in/sitemap.xml        # fallback if index not present
    concurrency: 2
    request_delay_ms: 1500                    # ~40 logical req/min including redirects
