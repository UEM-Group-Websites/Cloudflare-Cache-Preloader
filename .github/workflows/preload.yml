name: Cloudflare Cache Preload

on:
  schedule:
    - cron: "0 * * * *"             # every hour (uem needs ~26 min at 500 ms delay)
  workflow_dispatch:
    inputs:
      site:
        description: "Run a single site by name (optional)"
        required: false
        type: string
      dry_run:
        description: "Discover URLs only, don't fetch"
        required: false
        default: false
        type: boolean

concurrency:
  group: cache-preload
  cancel-in-progress: false

jobs:
  preload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Install Playwright (if any site uses it)
        run: |
          if grep -q 'fetcher: *playwright' config/sites.yml; then
            uv sync --extra playwright
            uv run playwright install --with-deps chromium
          fi

      - name: Run preloader
        env:
          INPUT_SITE: ${{ inputs.site }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          args=(--config config/sites.yml)
          if [ -n "$INPUT_SITE" ]; then args+=(--site "$INPUT_SITE"); fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then args+=(--dry-run); fi
          uv run python -m preloader "${args[@]}"
